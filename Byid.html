<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Document</title>
    <style>
        body{
            text-align: center;
        }

</head>
<body>
    <h1 id="title">Welcome!</h1>
    <button onclick="changeText()">Click Me</button>

function changeText() {

    heading.style.color = "red";
}
    </script>
